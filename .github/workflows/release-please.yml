name: release-please

on:
  push:
    branches:
      - main
      - 'release/**'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Strip -SNAPSHOT on main branch
        if: startsWith(github.ref, 'refs/heads/main')
        run: |
          set -euo pipefail
          file=gradle.properties
          if grep -qE '^newrelic\.agent\.version\s*=\s*[0-9]+\.[0-9]+\.[0-9]+-SNAPSHOT' "$file"; then
            sed -i -E 's/^(newrelic\.agent\.version\s*=\s*[0-9]+\.[0-9]+\.[0-9]+)-SNAPSHOT/\1/' "$file"
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$file"
            git commit -m "chore: strip -SNAPSHOT for release ${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "Stripped -SNAPSHOT and pushed; the resulting push will re-run this workflow."
            exit 0
          fi
          echo "No -SNAPSHOT to strip."

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Open PR to merge release into main
        if: ${{ steps.release.outputs.release_created == 'true' && startsWith(github.ref, 'refs/heads/release/') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --base main --head "${GITHUB_REF_NAME}" --state open --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open from ${GITHUB_REF_NAME} into main; skipping."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "${GITHUB_REF_NAME}" \
            --title "chore: merge ${TAG} into main" \
            --body "Automated PR to merge release ${TAG} from \`${GITHUB_REF_NAME}\` into \`main\`."
