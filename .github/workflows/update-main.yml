name: update-main

on:
  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-main:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward main to ${{ github.event.release.tag_name }}
        run: |
          git fetch origin --tags --force
          git merge --ff-only "${{ github.event.release.tag_name }}"
          git push origin main
