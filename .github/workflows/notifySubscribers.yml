# This is a basic workflow that is manually triggered

name: Notify_subscribers

# Controls when the action will run. Using workflow_dispatch runs when manually triggered using the UI
# or API.
on:
  # release:
  #   types: ['created']

  workflow_run:
    workflows: ['Release']
    types: ['completed']

    # workflow_dispatch:
  #   # Inputs the workflow accepts.
  #   inputs:
  #     name:
  #       # Friendly description to be shown in the UI instead of 'name'
  #       description: 'Notify mobile agent subscribers'

permissions:
  # This permission is needed so that git tags can be created.
  contents: write
  # This permission is needed for OIDC based publishing.
  id-token: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  notify:
    environment: dev
    runs-on: ubuntu-latest
    steps:
      - name:
        id: 'latest'
        run:  |
          echo -e "${{ toJSON(github.event.workflow_run) }}\n\n"
          echo "${{github.event.workflow_run.repository.releases_url}}/latest"
      # - name: Test
      #   id: test-notify
        # include conditional to only do think on success
